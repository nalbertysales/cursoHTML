<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Desafio Tabelas 2</title>
    <style>
      body {
        font-family: Arial, Helvetica, sans-serif;
        text-align: center;
        font-weight: li;
      }
      table {
        width: 500px;
        border-collapse: collapse;
      }
      th,
      td {
        border: 1px solid black;
        border-collapse: collapse;
        text-align: center;
      }

      th {
        background-color: rgb(143, 143, 143);
        color: white;
      }
      .materia {
        text-align: left;
      }
      .mediaTexto {
        text-align: left;
      }
      .media {
        background-color: rgb(143, 143, 143);
        color: white;
        font-weight: bolder;
      }
      .area {
        background-color: white;
        color: black;
      }
    </style>
  </head>
  <body>
    <table class="table">
      <thead>
        <tr>
          <th scope="col" rowspan="2">Área</th>
          <th scope="col" rowspan="2">Disciplina</th>
          <th scope="colgroup" colspan="2">Notas</th>
          <th scope="col" rowspan="2">Média</th>
        </tr>

        <tr>
          <th scope="row">Nota 1</th>
          <th scope="row">Nota 2</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <th scope="rowgroup" rowspan="4" class="area">Exatas</th>
          <td class="materia">Matématica</td>
          <td>0.0</td>
          <td>0.0</td>
          <td>0.0</td>
        </tr>

        <tr>
          <td class="materia">Física</td>
          <td class="notas">0.0</td>
          <td class="notas">0.0</td>
          <td class="notas">0.0</td>
        </tr>

        <tr>
          <td class="materia">Química</td>
          <td class="notas">0.0</td>
          <td class="notas">0.0</td>
          <td class="notas">0.0</td>
        </tr>

        <tr>
          <td class="materia">Biologia</td>
          <td class="notas">0.0</td>
          <td class="notas">0.0</td>
          <td class="notas">0.0</td>
        </tr>

        <tr>
          <th scope="row" colspan="4" class="mediaTexto">Média de Exatas</th>
          <td class="media" class="notas">0.0</td>
        </tr>

        <tr>
          <th scope="rowgroup" rowspan="2" class="area">Humanas</th>
          <td class="materia">Hitória</td>
          <td class="notas">0.0</td>
          <td class="notas">0.0</td>
          <td class="notas">0.0</td>
        </tr>

        <tr>
          <td class="materia">Geografia</td>
          <td class="notas">0.0</td>
          <td class="notas">0.0</td>
          <td class="notas">0.0</td>
        </tr>

        <tr>
          <th scope="row" colspan="4" class="mediaTexto">Média de Humanas</th>
          <td class="media" class="notas">0.0</td>
        </tr>
      </tbody>
    </table>
  </body>
</html>
