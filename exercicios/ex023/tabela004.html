<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tabela Real</title>
    <style>
      table {
        border-collapse: collapse;
      }
      th {
        border: 1px solid black;
      }
      td {
        border: 1px solid black;
        padding: 5px 20px 5px 5px;
        text-align: left;
      }
      .grupo {
        padding: 20px;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <h1>TABELA REAL</h1>

    <table class="table">
      <thead>
        <tr>
          <th scope="col">Grupo</th>
          <th scope="col">Nomes</th>
          <th scope="colgroup" colspan="3">Filmes</th>
          <!-- Colgroup se usa quando se tem mais de uma coluna no mesmo grupo, a mesma coisa pra o RowGroup-->
        </tr>
      </thead>
      <tbody>
        <tr>
          <th scope="rowgroup" rowspan="3" class="grupo">Mulheres</th>
          <td>Ana Maria Santos</td>
          <td>Alien</td>
          <td>Rambo</td>
          <td>Vingadores</td>
        </tr>

        <tr>
          <td>Beatriz Souza</td>
          <td>Hulk</td>
          <td>Inception</td>
          <td>Batman</td>
        </tr>

        <tr>
          <td>Cláudia Melo</td>
          <td>Oblivion</td>
          <td>Matrix</td>
          <td>Big Hero</td>
        </tr>

        <tr>
          <th scope="rowgroup" rowspan="3" class="grupo">Homens</th>
          <td>Bruno Mendonça</td>
          <td>Intocáveis</td>
          <td>Amnésia</td>
          <td>Gladiador</td>
        </tr>

        <tr>
          <td>Daniel Lourenço</td>
          <td>Wall-E</td>
          <td>Oldboy</td>
          <td>Dangal</td>
        </tr>

        <tr>
          <td>Fabiano Mota</td>
          <td>Star Wars 5</td>
          <td>Taci Driver</td>
          <td>Toy Story</td>
        </tr>
      </tbody>
    </table>
  </body>
</html>
