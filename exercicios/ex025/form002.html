<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Formulário</title>
  </head>
  <body>
    <h1>Teste de Formulário</h1>

    <form action="#" method="post" autocomplete="on">
      <p>
        <label for="iname">Nome</label>
        <input
          type="text"
          name="nome"
          id="iname"
          required
          maxlength="15"
          placeholder="Nome completo"
          autocomplete="name"
        />
      </p>
      <p>
        <label for="isenha">Senha</label>
        <input
          type="password"
          name="senha"
          id="isenha"
          required
          minlength="8"
          maxlength="30"
          size="15"
          placeholder="mínimo 8 caractéres"
        />
      </p>
      <p>
        <label for="imedia">Média</label>
        <input
          type="number"
          name="media"
          id="imedia"
          min="0"
          max="10"
          step="0.01"
          value="5"
          required
        />
      </p>
      <p>
        <label for="imes">Período Letivo</label>
        <input type="month" name="mes" id="imes" value="2026-04" />
      </p>
      <p>
        <label for="idia">Dia da Prova</label>
        <input type="date" name="dia" id="idia" value="2026-04-16" />
      </p>
      <p>
        <label for="ihora">Horário da Prova</label>
        <input type="time" name="hora" id="ihora" />
      </p>

      <p>
        <input type="submit" value="Enviar" />
        <input type="reset" value="Limpar" />
      </p>
    </form>
  </body>
</html>
