<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Estudos de iframe</title>
    <style>
      iframe {
        width: 500px;
        height: 500px;
      }
    </style>
  </head>
  <body>
    <h1>Testando o uso de iframes</h1>
    <p>
      Acessando o site do
      <iframe
        src="https://www.cursoemvideo.com"
        frameborder="0"
        scrolling="no"
      ></iframe>
      para aprender a programar
    </p>

    <p>
      O site do
      <iframe src="https://www.google.com.br" frameborder="0">
        <a href="https://youtube.com.br" target="_blank">youtube</a></iframe
      >
      é muito legal
    </p>
  </body>
</html>
