<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Adiocionando conteúdo</title>
  </head>
  <body>
    <h1>Conteúdos dentro do iframes</h1>
    <p>
      Lorem ipsum, dolor sit amet consectetur adipisicing elit. Dolorem ipsam
      vel aliquam pariatur est error doloribus in, labore totam illo.
      Accusantium perspiciatis aut illo illum veritatis rerum voluptate delectus
      maiores!
    </p>
    <h2>Vídeos</h2>
    <div style="padding: 56.25% 0 0 0; position: relative">
      <iframe
        src="https://player.vimeo.com/video/1163185910?badge=0&amp;autopause=0&amp;player_id=0&amp;app_id=58479"
        frameborder="0"
        allow="
          autoplay;
          fullscreen;
          picture-in-picture;
          clipboard-write;
          encrypted-media;
          web-share;
        "
        referrerpolicy="strict-origin-when-cross-origin"
        style="position: absolute; top: 0; left: 0; width: 100%; height: 100%"
        title="HONEYMOON"
      ></iframe>
    </div>
    <script src="https://player.vimeo.com/api/player.js"></script>
    <h2>Mapas do Google</h2>
    <iframe
      src="https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d15357.093664959153!2d-47.87705250881178!3d-15.789530707072046!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!5e0!3m2!1spt-BR!2sbr!4v1770843422526!5m2!1spt-BR!2sbr"
      width="600"
      height="450"
      style="border: 0"
      allowfullscreen=""
      loading="lazy"
      referrerpolicy="no-referrer-when-downgrade"
    ></iframe>

    <h2>Mapas do Waze</h2>
    <iframe
      src="https://embed.waze.com/iframe?zoom=16&lat=-15.791552&lon=-47.880167&ct=livemap"
      width="600"
      height="450"
      allowfullscreen
    ></iframe>
  </body>
</html>
